version: 1.3.5
cache: true

# =============================================================================
# JARVIS LibreChat Configuration (Updated 2026-04-04 v3)
# Multi-model access via OpenRouter + MCP integrations
# SSE-based MCP for Railway cloud deployment
# =============================================================================

# =============================================================================
# SPEECH — Talk to Jarvis, Jarvis talks back
# =============================================================================

speech:
  stt:
    openai:
      url: "https://api.openai.com/v1/audio"
      apiKey: "${OPENAI_STT_KEY}"
      model: "whisper-1"
  tts:
    openai:
      url: "https://api.openai.com/v1/audio"
      apiKey: "${OPENAI_TTS_KEY}"
      model: "tts-1"
      voices:
        - "onyx"
        - "alloy"
        - "echo"
        - "fable"
        - "nova"
        - "shimmer"

interface:
  privacyPolicy:
    externalUrl: ""
  termsOfService:
    externalUrl: ""

registration:
  socialLogins: []
  allowedDomains:
    - "gmail.com"

endpoints:
  custom:
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default:
          - "anthropic/claude-opus-4.6"
          - "anthropic/claude-sonnet-4.6"
          - "anthropic/claude-haiku-4.5"
          - "openai/gpt-5.4"
          - "openai/gpt-5.4-nano"
          - "openai/gpt-5.3-codex"
          - "google/gemini-3.1-pro"
          - "google/gemini-3.1-flash-lite"
          - "google/gemini-3-flash-preview"
        fetch: true
      titleConvo: true
      titleModel: "google/gemini-3.1-flash-lite"
      summarize: false
      forcePrompt: false
      dropParams:
        - "stop"
        - "user"
      modelDisplayLabel: "OpenRouter"
      iconURL: "https://openrouter.ai/favicon.ico"

# =============================================================================
# MCP SERVERS — SSE-based for Railway cloud deployment
# stdio servers don't work on Railway (multi-stage Docker build)
# =============================================================================

mcpServers:
  # =========================================================================
  # NOTION — 14 Jarvis operational databases (via Notion's hosted MCP)
  # Uses OAuth — will prompt for Notion authorization on first use
  # =========================================================================
  notion:
    type: sse
    url: "https://mcp.notion.com/sse"
    oauth:
      redirect_uri: "https://librechat-production-a9cd.up.railway.app/api/mcp/notion/oauth/callback"
    serverInstructions: >
      Zachary's Notion workspace containing 14 Jarvis operational databases:
      Active Priorities, Active Board, People Directory, People Tracker,
      Arcs, Decisions, Relationship Dynamics, Succession Pipeline, Deliverables,
      Mental Models, Capture Inbox, Quotes, Episodic Archive, and
      Self-Leadership Learnings. Use NOTION-OPS.md patterns for database IDs
      and queries.
    timeout: 30000
    initTimeout: 10000

  google_workspace:
    type: streamable-http
    url: "https://googleworkspacemcp-production-73bd.up.railway.app/mcp"
    startup: false
    timeout: 30000
    serverInstructions: >
      Google Workspace tools for Drive and Calendar access.
      Drive contains Zachary's Obsidian vault with Jarvis system files.
      Vault root: 1lkD-mp14cHp0-7IsGIu9b-Oth5GYKxV-
      Jarvis/: 1rbtlW4_J7lJ_yoqx-ORKP8Iv9uKekVMO
      Modes/: 1YLuyatpi5e4WfcEIr_vdY2NrzrjkOUcl

  supermemory:
    type: streamable-http
    url: "https://mcp.supermemory.ai/mcp"
    startup: false
    oauth: true
    timeout: 15000
    serverInstructions: >
      Semantic memory layer for Jarvis. Container: sm_project_jarvis.
      Use recall with containerTag "sm_project_jarvis" to retrieve
      cross-session context. Supplements Notion databases with fuzzy
      similarity matching. Never replace canonical data — only supplement.
      If recalled memory contradicts flat file state, trust the flat file.

