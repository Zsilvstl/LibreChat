version: 1.3.5
cache: true

# =============================================================================
# JARVIS LibreChat Configuration (Updated 2026-04-04)
# Multi-model access via OpenRouter + MCP integrations
# =============================================================================

# =============================================================================
# SPEECH — Talk to Jarvis, Jarvis talks back
# =============================================================================

speech:
  stt:
    openai:
      url: "https://api.openai.com/v1/audio"
      apiKey: "${OPENAI_STT_KEY}"
      model: "whisper-1"
  tts:
    openai:
      url: "https://api.openai.com/v1/audio"
      apiKey: "${OPENAI_TTS_KEY}"
      model: "tts-1"
      voice: "onyx"

interface:
  privacyPolicy:
    externalUrl: ""
  termsOfService:
    externalUrl: ""

registration:
  socialLogins: []
  allowedDomains:
    - "gmail.com"

endpoints:
  custom:
    # =========================================================================
    # OPENROUTER — Single API key, all models
    # =========================================================================
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default:
          # --- Claude (Anthropic) ---
          - "anthropic/claude-opus-4.6"
          - "anthropic/claude-sonnet-4.6"
          - "anthropic/claude-haiku-4.5"
          # --- GPT (OpenAI) ---
          - "openai/gpt-5.4"
          - "openai/gpt-5.4-nano"
          - "openai/gpt-5.3-codex"
          # --- Gemini (Google) ---
          - "google/gemini-3.1-pro"
          - "google/gemini-3.1-flash-lite"
          - "google/gemini-3-flash-preview"
        fetch: true
      titleConvo: true
      titleModel: "google/gemini-3.1-flash-lite"
      summarize: false
      forcePrompt: false
      dropParams:
        - "stop"
        - "user"
      modelDisplayLabel: "OpenRouter"
      iconURL: "https://openrouter.ai/favicon.ico"

# =============================================================================
# MCP SERVERS — Jarvis Tool Integration Layer
# =============================================================================

mcpServers:
  # =========================================================================
  # NOTION — 14 Jarvis operational databases (read/write)
  # =========================================================================
  notion:
    type: stdio
    command: npx
    args:
      - -y
      - "@notionhq/notion-mcp-server"
    env:
      OPENAPI_MCP_HEADERS: '{"Authorization": "Bearer ${NOTION_API_KEY}", "Notion-Version": "2022-06-28"}'
    timeout: 30000
    initTimeout: 15000
    serverInstructions: >
      Zachary's Notion workspace containing 14 Jarvis operational databases:
      Active Priorities, Active Board, People Directory, People Tracker,
      Arcs, Decisions, Relationship Dynamics, Succession Pipeline, Deliverables,
      Mental Models, Capture Inbox, Quotes, Episodic Archive, and
      Self-Leadership Learnings. Use NOTION-OPS.md patterns for database IDs
      and queries.

  # =========================================================================
  # SUPERMEMORY — Semantic recall across sessions
  # Container: sm_project_jarvis (78+ memories)
  # =========================================================================
  supermemory:
    type: stdio
    command: npx
    args:
      - -y
      - "supermemory-mcp"
    env:
      SUPERMEMORY_API_KEY: "${SUPERMEMORY_API_KEY}"
    timeout: 15000
    initTimeout: 10000
    serverInstructions: >
      Semantic memory layer for Jarvis. Container: sm_project_jarvis.
      Use recall with containerTag "sm_project_jarvis" to retrieve
      cross-session context. Supplements Notion databases with fuzzy
      similarity matching. Never replace canonical data — only supplement.
      If recalled memory contradicts flat file state, trust the flat file.

