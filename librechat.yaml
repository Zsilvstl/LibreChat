version: 1.3.5
cache: true

speech:
  stt:
    openai:
      url: "https://api.openai.com/v1/audio"
      apiKey: "${OPENAI_STT_KEY}"
      model: "whisper-1"
  tts:
    openai:
      url: "https://api.openai.com/v1/audio"
      apiKey: "${OPENAI_TTS_KEY}"
      model: "tts-1"
      voice: "onyx"

interface:
  privacyPolicy:
    externalUrl: ""
  termsOfService:
    externalUrl: ""

registration:
  socialLogins: []
  allowedDomains:
    - "gmail.com"

endpoints:
  custom:
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default:
          - "anthropic/claude-opus-4.6"
          - "anthropic/claude-sonnet-4.6"
          - "anthropic/claude-haiku-4.5"
          - "openai/gpt-5.4"
          - "openai/gpt-5.4-nano"
          - "openai/gpt-5.3-codex"
          - "google/gemini-3.1-pro"
          - "google/gemini-3.1-flash-lite"
          - "google/gemini-3-flash-preview"
        fetch: true
      titleConvo: true
      titleModel: "google/gemini-3.1-flash-lite"
      summarize: false
      forcePrompt: false
      dropParams:
        - "stop"
        - "user"
      modelDisplayLabel: "OpenRouter"
